<?xml version="1.0" encoding="UTF-8"?>
<!--
  StartupGroups icon — badge style.
  Solid blue rounded-square tile with three cascading white bars.
  Concept: readiness-gated group launch (Gantt metaphor), middle bar is the bottleneck.
  64x64 design grid. branding/build-icons.ps1 rasterises with identical coordinates.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12" fill="#2563EB"/>
  <rect x="12" y="15" width="24" height="10" rx="5" ry="5" fill="#FFFFFF" fill-opacity="0.7"/>
  <rect x="20" y="27" width="32" height="10" rx="5" ry="5" fill="#FFFFFF"/>
  <rect x="30" y="39" width="18" height="10" rx="5" ry="5" fill="#FFFFFF" fill-opacity="0.7"/>
</svg>
