name: CodeQL

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', '.gitignore', 'LICENSE']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', '.gitignore', 'LICENSE']
  schedule:
    - cron: '0 6 * * 1'

# Cancel in-flight runs on the same ref when a new push arrives.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    # ubuntu is faster for the analyzer's I/O-heavy work; we use build-mode: none
    # so we never compile (which would fail on Linux for our WPF/net10.0-windows
    # target). CodeQL analyzes source directly — target OS doesn't matter.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [csharp]
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
