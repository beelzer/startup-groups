name: Semantic PR

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  semantic-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      # Step-level skip (not job-level): the job still reports SUCCESS for
      # dependabot PRs, satisfying any required-check rules. Dependabot's
      # titles are validated via dependabot.yml's commit-message.prefix.
      - if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            revert
            docs
            test
            chore
            build
            ci
            deps
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.
