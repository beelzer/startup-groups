name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Tag $tag → version=$version"

          # Reject prerelease tags here — release.yml is the Stable track.
          # Canary builds run from canary.yml on every push to main; they
          # don't go through tag triggers. Refuse anything that looks like
          # a prerelease so we don't accidentally publish one as Stable.
          if ($version -match '-') {
            Write-Error "Tag $tag is a prerelease (contains '-'). release.yml is Stable-only; canaries are produced by canary.yml on every push to main."
            exit 1
          }

          # Sanity: tag version must match Directory.Build.props exactly.
          [xml]$props = Get-Content Directory.Build.props
          $propsVersion = [string]$props.Project.PropertyGroup.Version
          if ($propsVersion -ne $version) {
            Write-Error "Tag $tag (version $version) does not match Directory.Build.props version $propsVersion"
            exit 1
          }

      - name: Install WiX
        shell: pwsh
        run: |
          # Pin all four to the same version — extension and core wix must match.
          # BootstrapperApplications.wixext is the WiX 5 successor to Bal.wixext;
          # required for the Phase 3 Burn bundle build.
          dotnet tool install --global wix --version 5.0.2
          wix extension add -g WixToolset.UI.wixext/5.0.2
          wix extension add -g WixToolset.Util.wixext/5.0.2
          wix extension add -g WixToolset.BootstrapperApplications.wixext/5.0.2

      - name: Install Velopack CLI
        run: dotnet tool install --global vpk --version 0.0.1589-ga2c5a97

      - name: Restore
        run: dotnet restore StartupGroups.slnx

      - name: Build
        run: dotnet build StartupGroups.slnx -c Release --no-restore

      - name: Test
        run: dotnet test StartupGroups.slnx -c Release --no-build --verbosity normal

      - name: Build MSI (single-file payload, for enterprise/per-machine track)
        shell: pwsh
        run: ./installer/StartupGroups.Installer/build.ps1

      - name: Rename MSI to versioned filename
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Copy-Item artifacts/installer/StartupGroups.msi "artifacts/installer/StartupGroups-$version.msi"

      - name: Build Burn bundle (Phase 3 — Setup.exe wrapping the MSI + managed BA)
        shell: pwsh
        run: ./installer/StartupGroups.Bundle/build.ps1

      - name: Rename Burn bundle to primary Setup.exe asset
        shell: pwsh
        run: |
          # The bundle becomes the primary download from v0.3.0 onward.
          # vpk later uploads a "StartupGroups-win-Setup.exe" of its own
          # (the Velopack-flavoured first-install installer); we keep that
          # too for now so existing Velopack flows aren't disrupted, but
          # rename our Burn bundle to the unambiguous "StartupGroups-Setup.exe".
          Move-Item artifacts/installer/StartupGroups-Bundle-Setup.exe artifacts/installer/StartupGroups-Setup.exe

      - name: Publish for Velopack (multi-file, enables per-file deltas)
        shell: pwsh
        run: |
          # Velopack does per-file binary diffs across releases; single-file would
          # negate that. Publish multi-file alongside the MSI's single-file build.
          dotnet publish src/StartupGroups.App/StartupGroups.App.csproj `
            -c Release -r win-x64 --self-contained true `
            -o artifacts/publish-velopack -nologo -v minimal
          dotnet publish src/StartupGroups.Elevator/StartupGroups.Elevator.csproj `
            -c Release -r win-x64 --self-contained true `
            -o artifacts/publish-velopack -nologo -v minimal

      - name: Pack Velopack release
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          # Stable uses Velopack's default channel ("win") — existing v0.2.x
          # users (who shipped without ExplicitChannel) keep finding updates
          # via releases.win.json. Canary lives on its own channel via
          # canary.yml and is invisible to Stable users.
          vpk pack `
            -u StartupGroups `
            -v $version `
            -p artifacts/publish-velopack `
            --mainExe StartupGroups.exe `
            --packTitle "Startup Groups" `
            --icon src/StartupGroups.App/Assets/app.ico

      # release-drafter autocreates draft releases on every push to main, which
      # collide with vpk's "create new release for this tag" step (vpk refuses
      # if any release with this tag already exists). Delete any pre-existing
      # release for this tag — should always be a draft from release-drafter,
      # never a published one.
      - name: Remove any existing draft for this tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $existing = gh api "repos/${{ github.repository }}/releases" `
            --jq ".[] | select(.tag_name == ""${{ github.ref_name }}"") | .id"
          if ($existing) {
            foreach ($id in $existing) {
              Write-Host "Deleting pre-existing release id=$id for tag ${{ github.ref_name }}"
              gh api -X DELETE "repos/${{ github.repository }}/releases/$id"
            }
          } else {
            Write-Host "No pre-existing release for tag ${{ github.ref_name }}"
          }

      # vpk creates and owns the release (as a draft). Doing this BEFORE
      # gh release create avoids the previous bug where vpk's --merge couldn't
      # cleanly merge into an already-published release and stranded a duplicate
      # draft alongside it.
      - name: Create GitHub release via vpk (draft, with Velopack assets)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          # Stable release: not a prerelease. The "Latest" badge and the
          # homepage releases widget pin to whichever Stable tag has the
          # highest version, ignoring Canary builds entirely.
          vpk upload github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token $env:GH_TOKEN `
            --tag "${{ github.ref_name }}" `
            --releaseName "${{ github.ref_name }}"

      - name: Append MSI to the release (enterprise track)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          gh release upload "${{ github.ref_name }}" `
            "artifacts/installer/StartupGroups-$version.msi" `
            --clobber

      - name: Append Burn bundle Setup.exe to the release (primary first-install asset)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          # The Burn bundle is the new primary download from v0.3.0 onward —
          # Mica + Fluent UI, replaces the old WixUI dialogs. Velopack still
          # produces its own StartupGroups-win-Setup.exe for the per-user
          # auto-update install path, which we leave alongside.
          gh release upload "${{ github.ref_name }}" `
            "artifacts/installer/StartupGroups-Setup.exe" `
            --clobber

      # vpk creates the release as a draft. Publish it with auto-generated
      # notes from PRs/commits since the previous tag.
      # Note: gh release edit doesn't support --generate-notes (only gh release
      # create does), so we generate via the API and pass via --notes-file.
      - name: Publish release with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $notes = gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" `
            -f tag_name="${{ github.ref_name }}" `
            --jq '.body'
          $notesFile = New-TemporaryFile
          $notes | Set-Content -Path $notesFile -Encoding UTF8
          gh release edit "${{ github.ref_name }}" `
            --draft=false `
            --notes-file $notesFile
