name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Tag $tag → version=$version"

          # Reject prerelease tags here — release.yml is the Stable track.
          # Canary builds run from ci.yml on every push to main; they
          # don't go through tag triggers. Refuse anything that looks like
          # a prerelease so we don't accidentally publish one as Stable.
          if ($version -match '-') {
            Write-Error "Tag $tag is a prerelease (contains '-'). release.yml is Stable-only; canaries are produced by ci.yml on every push to main."
            exit 1
          }

          # Sanity: tag version must match Directory.Build.props exactly.
          [xml]$props = Get-Content Directory.Build.props
          $propsVersion = [string]$props.Project.PropertyGroup.Version
          if ($propsVersion -ne $version) {
            Write-Error "Tag $tag (version $version) does not match Directory.Build.props version $propsVersion"
            exit 1
          }

      - name: Install WiX
        shell: pwsh
        run: |
          # Pin all four to the same version — extension and core wix must match.
          # BootstrapperApplications.wixext is the WiX 5 successor to Bal.wixext;
          # required for the Phase 3 Burn bundle build.
          dotnet tool install --global wix --version 5.0.2
          wix extension add -g WixToolset.UI.wixext/5.0.2
          wix extension add -g WixToolset.Util.wixext/5.0.2
          wix extension add -g WixToolset.BootstrapperApplications.wixext/5.0.2

      - name: Install Velopack CLI
        run: dotnet tool install --global vpk --version 0.0.1589-ga2c5a97

      - name: Restore
        run: dotnet restore StartupGroups.slnx

      - name: Build
        run: dotnet build StartupGroups.slnx -c Release --no-restore

      - name: Test
        run: dotnet test StartupGroups.slnx -c Release --no-build --verbosity normal

      - name: Build MSI (single-file payload, for enterprise/per-machine track)
        shell: pwsh
        run: ./installer/StartupGroups.Installer/build.ps1

      - name: Rename MSI to versioned filename
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Copy-Item artifacts/installer/StartupGroups.msi "artifacts/installer/StartupGroups-$version.msi"

      - name: Publish for Velopack (multi-file, enables per-file deltas)
        shell: pwsh
        run: |
          # Velopack does per-file binary diffs across releases; single-file would
          # negate that. Publish multi-file alongside the MSI's single-file build.
          dotnet publish src/StartupGroups.App/StartupGroups.App.csproj `
            -c Release -r win-x64 --self-contained true `
            -o artifacts/publish-velopack -nologo -v minimal
          dotnet publish src/StartupGroups.Elevator/StartupGroups.Elevator.csproj `
            -c Release -r win-x64 --self-contained true `
            -o artifacts/publish-velopack -nologo -v minimal

      - name: Pack Velopack release
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          # Stable uses Velopack's default channel ("win") — existing v0.2.x
          # users (who shipped without ExplicitChannel) keep finding updates
          # via releases.win.json. Canary lives on its own channel via
          # ci.yml and is invisible to Stable users.
          # Output goes to ./Releases/ by default — Burn bundle build below
          # picks up Releases/StartupGroups-win-Setup.exe from there.
          vpk pack `
            -u StartupGroups `
            -v $version `
            -p artifacts/publish-velopack `
            --mainExe StartupGroups.exe `
            --packTitle "Startup Groups" `
            --icon src/StartupGroups.App/Assets/app.ico

      - name: Build Burn bundle (Setup.exe wrapping Velopack Setup + managed BA)
        shell: pwsh
        run: |
          # Wraps vpk's lean Setup.exe with the styled Mica BA UX. The
          # chained ExePackage runs Setup.exe --silent under the hood, so
          # the Velopack runtime (Update.exe + current\ + packages\) ends
          # up at %LocalAppData%\StartupGroups\ — same destination as a
          # direct Setup.exe install. Auto-update keeps working because
          # the runtime files are present.
          ./installer/StartupGroups.Bundle/build.ps1 `
            -VelopackSetupPath Releases/StartupGroups-win-Setup.exe

      - name: Rename Burn bundle to primary Setup.exe asset
        shell: pwsh
        run: |
          # The bundle is the primary user-facing download (Mica + Fluent UI).
          # vpk also uploads its own lean StartupGroups-win-Setup.exe; we keep
          # both — the lean one is the canonical Velopack first-install path,
          # and any user who picks it gets the same end state, just without
          # the styled BA. Renaming our bundle to the unambiguous
          # "StartupGroups-Setup.exe" makes it the obvious primary download.
          Move-Item artifacts/installer/StartupGroups-Bundle-Setup.exe artifacts/installer/StartupGroups-Setup.exe

      # release-drafter autocreates draft releases on every push to main, which
      # collide with vpk's "create new release for this tag" step (vpk refuses
      # if any release with this tag already exists). Delete any pre-existing
      # release for this tag — should always be a draft from release-drafter,
      # never a published one.
      - name: Remove any existing draft for this tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $existing = gh api "repos/${{ github.repository }}/releases" `
            --jq ".[] | select(.tag_name == ""${{ github.ref_name }}"") | .id"
          if ($existing) {
            foreach ($id in $existing) {
              Write-Host "Deleting pre-existing release id=$id for tag ${{ github.ref_name }}"
              gh api -X DELETE "repos/${{ github.repository }}/releases/$id"
            }
          } else {
            Write-Host "No pre-existing release for tag ${{ github.ref_name }}"
          }

      # vpk creates and owns the release (as a draft). Doing this BEFORE
      # gh release create avoids the previous bug where vpk's --merge couldn't
      # cleanly merge into an already-published release and stranded a duplicate
      # draft alongside it.
      - name: Create GitHub release via vpk (draft, with Velopack assets)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          # Stable release: not a prerelease. The "Latest" badge and the
          # homepage releases widget pin to whichever Stable tag has the
          # highest version, ignoring Canary builds entirely.
          vpk upload github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token $env:GH_TOKEN `
            --tag "${{ github.ref_name }}" `
            --releaseName "${{ github.ref_name }}"

      - name: Append MSI to the release (enterprise track)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          gh release upload "${{ github.ref_name }}" `
            "artifacts/installer/StartupGroups-$version.msi" `
            --clobber

      - name: Append Burn bundle Setup.exe to the release (primary first-install asset)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          # The Burn bundle is the primary user-facing download — Mica + Fluent
          # UI wrapping Velopack's silent Setup. Velopack still produces its own
          # StartupGroups-win-Setup.exe for the lean first-install path, which
          # we leave alongside as a fallback.
          gh release upload "${{ github.ref_name }}" `
            "artifacts/installer/StartupGroups-Setup.exe" `
            --clobber

      # ---- MSIX track (Phase 1 of the Velopack→MSIX migration) ----
      # Builds the MSIX + .appinstaller and uploads to the GitHub release
      # alongside the legacy Velopack/Burn assets. Once the MSIX track has
      # soaked through real users, Phase 3 cleanup deletes the legacy
      # steps above and this becomes the only path. See
      # docs/MIGRATION_PLAN.md.
      #
      # Signing flips on automatically when the MSIX_SIGNING_CERT_BASE64 +
      # MSIX_SIGNING_PASSWORD secrets are set. Until then, the .msix
      # uploads unsigned — installable only via Windows Developer Mode.
      # Real users get a working install path the moment the cert lands.

      - name: Decode MSIX signing cert (if available)
        if: env.MSIX_SIGNING_CERT_BASE64 != ''
        env:
          MSIX_SIGNING_CERT_BASE64: ${{ secrets.MSIX_SIGNING_CERT_BASE64 }}
        id: cert
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String($env:MSIX_SIGNING_CERT_BASE64)
          $path = Join-Path $env:RUNNER_TEMP 'msix-signing.pfx'
          [IO.File]::WriteAllBytes($path, $bytes)
          "path=$path" >> $env:GITHUB_OUTPUT
          Write-Host "Cert decoded to $path"

      - name: Build MSIX (sideload variant)
        env:
          MSIX_SIGNING_CERT_BASE64: ${{ secrets.MSIX_SIGNING_CERT_BASE64 }}
          MSIX_SIGNING_PASSWORD: ${{ secrets.MSIX_SIGNING_PASSWORD }}
          MSIX_SIDELOAD_PUBLISHER: ${{ secrets.MSIX_SIDELOAD_PUBLISHER }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}.0"
          $args = @(
              '-Version', $version
          )
          # Publisher: defaults to CN=StartupGroupsDev (manifest default).
          # Override via MSIX_SIDELOAD_PUBLISHER secret to match the cert
          # subject once SignPath/Certum issues it.
          if ($env:MSIX_SIDELOAD_PUBLISHER) {
              $args += @('-Publisher', $env:MSIX_SIDELOAD_PUBLISHER)
          }
          # Sign only if both cert + password are present.
          if ($env:MSIX_SIGNING_CERT_BASE64 -and $env:MSIX_SIGNING_PASSWORD) {
              $args += @('-CertPath', '${{ steps.cert.outputs.path }}',
                         '-CertPassword', $env:MSIX_SIGNING_PASSWORD)
              Write-Host 'Building signed MSIX...' -ForegroundColor Cyan
          } else {
              Write-Host 'No signing secrets set — building unsigned MSIX.' -ForegroundColor Yellow
          }
          ./installer/Msix/build.ps1 @args

      - name: Generate .appinstaller XML
        env:
          MSIX_SIDELOAD_PUBLISHER: ${{ secrets.MSIX_SIDELOAD_PUBLISHER }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}.0"
          $msixFile = "StartupGroups-$version.msix"
          $args = @(
              '-Version', $version,
              '-MsixFileName', $msixFile,
              '-RepoUrl', "https://github.com/${{ github.repository }}",
              '-Tag', "${{ github.ref_name }}"
          )
          if ($env:MSIX_SIDELOAD_PUBLISHER) {
              $args += @('-Publisher', $env:MSIX_SIDELOAD_PUBLISHER)
          }
          ./installer/Msix/generate-appinstaller.ps1 @args

      - name: Upload MSIX + .appinstaller to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}.0"
          gh release upload "${{ github.ref_name }}" `
            "artifacts/msix/StartupGroups-$version.msix" `
            "artifacts/msix/StartupGroups.appinstaller" `
            --clobber

      # ---- Store variant (only built when MSIX_STORE_PUBLISHER is set) ----
      # Same MSIX content, but the Identity Publisher field matches the
      # Partner Center reservation. Microsoft re-signs with their own cert
      # during Store certification, so no signing cert is required here —
      # we just rebuild the package with the Store publisher value baked in.
      # Output is left as a CI artifact (not on the GitHub release) so the
      # binary intended for Store submission stays visibly distinct from
      # the sideload binary on the release page.
      - name: Build MSIX (Store variant)
        if: env.MSIX_STORE_PUBLISHER != ''
        env:
          MSIX_STORE_PUBLISHER: ${{ secrets.MSIX_STORE_PUBLISHER }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}.0"
          $output  = "artifacts/msix-store/StartupGroups-Store-$version.msix"
          ./installer/Msix/build.ps1 `
            -Version $version `
            -Publisher $env:MSIX_STORE_PUBLISHER `
            -OutputPath $output

      - name: Upload Store MSIX as artifact
        if: env.MSIX_STORE_PUBLISHER != ''
        env:
          MSIX_STORE_PUBLISHER: ${{ secrets.MSIX_STORE_PUBLISHER }}
        uses: actions/upload-artifact@v4
        with:
          name: StartupGroups-msix-store
          path: artifacts/msix-store/*.msix
          if-no-files-found: error
          retention-days: 30

      # ---- winget submission ----
      # Auto-PRs a manifest update to microsoft/winget-pkgs on every signed
      # release. Skips when WINGET_RELEASER_TOKEN is not set so unsigned
      # development releases don't try to submit. Identifier must match the
      # one registered in winget-pkgs (Publisher.AppName); placeholder
      # below until reservation confirms the canonical name.
      - name: Submit to winget
        if: env.WINGET_RELEASER_TOKEN != '' && env.MSIX_SIGNING_CERT_BASE64 != ''
        env:
          WINGET_RELEASER_TOKEN: ${{ secrets.WINGET_RELEASER_TOKEN }}
          MSIX_SIGNING_CERT_BASE64: ${{ secrets.MSIX_SIGNING_CERT_BASE64 }}
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: StartupGroups.StartupGroups
          installers-regex: '\.msix$'
          token: ${{ secrets.WINGET_RELEASER_TOKEN }}

      # vpk creates the release as a draft. Publish it with auto-generated
      # notes from PRs/commits since the previous tag.
      # Note: gh release edit doesn't support --generate-notes (only gh release
      # create does), so we generate via the API and pass via --notes-file.
      - name: Publish release with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $notes = gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" `
            -f tag_name="${{ github.ref_name }}" `
            --jq '.body'
          $notesFile = New-TemporaryFile
          $notes | Set-Content -Path $notesFile -Encoding UTF8
          gh release edit "${{ github.ref_name }}" `
            --draft=false `
            --notes-file $notesFile
