name: CI

# Single source of truth for "did this change pass validation?". On PRs we
# build and test. On push-to-main we additionally publish a canary release
# (replaces the old separate canary.yml). The publish-canary steps are
# gated on `github.event_name == 'push'` so PR runs stay read-only.
#
# Why combined: canary.yml previously raced ci.yml on every main push —
# duplicating build/test work and risking publishing a release before CI
# (or CodeQL) had agreed the code was healthy.

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', '.gitignore', 'LICENSE']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', '.gitignore', 'LICENSE']
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # required for the canary publish steps on main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: dotnet restore StartupGroups.slnx

      - name: Build
        run: dotnet build StartupGroups.slnx -c Release --no-restore

      - name: Test
        run: dotnet test StartupGroups.slnx -c Release --no-build --verbosity normal

      # ---- Canary publish steps (push-to-main only; skipped on PR runs) ----

      - name: Compute canary version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          [xml]$props = Get-Content Directory.Build.props
          $base = [string]$props.Project.PropertyGroup.Version
          # Take the max existing canary number on this base version + 1.
          # Resets when Directory.Build.props bumps the base (e.g. 0.2.14 →
          # 0.3.0 starts a fresh canary.1). Plain numeric so the prerelease
          # identifier is semver-2.0 compliant.
          #
          # Why max+1 not count+1: deleted canaries leave numbering gaps
          # (e.g. canary.1 + canary.2 deleted, canary.3..9 kept → count=7
          # would collide with the existing canary.8). Max+1 is gap-safe.
          #
          # Filter in PowerShell rather than via gh's --jq flag — the
          # latter needs nested-quote escaping that pwsh's parser mangles.
          $releases = gh api "repos/${{ github.repository }}/releases" --paginate | ConvertFrom-Json
          $pattern = "^v$([regex]::Escape($base))-canary\.(\d+)$"
          $numbers = @($releases | ForEach-Object {
            if ($_.tag_name -match $pattern) { [int]$Matches[1] }
          })
          $max = if ($numbers.Count -gt 0) { ($numbers | Measure-Object -Maximum).Maximum } else { 0 }
          $next = $max + 1
          $version = "$base-canary.$next"
          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Canary version=$version tag=$tag (existing on base ${base}: count=$($numbers.Count) max=$max)"

      - name: Install WiX
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          # Pin all four to the same version — extension and core wix must match.
          # BootstrapperApplications.wixext is the WiX 5 successor to Bal.wixext;
          # required for the Burn bundle that wraps Velopack Setup.exe.
          dotnet tool install --global wix --version 5.0.2
          wix extension add -g WixToolset.UI.wixext/5.0.2
          wix extension add -g WixToolset.Util.wixext/5.0.2
          wix extension add -g WixToolset.BootstrapperApplications.wixext/5.0.2

      - name: Install Velopack CLI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet tool install --global vpk --version 0.0.1589-ga2c5a97

      - name: Publish for Velopack
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          dotnet publish src/StartupGroups.App/StartupGroups.App.csproj `
            -c Release -r win-x64 --self-contained true `
            -o artifacts/publish-velopack -nologo -v minimal
          dotnet publish src/StartupGroups.Elevator/StartupGroups.Elevator.csproj `
            -c Release -r win-x64 --self-contained true `
            -o artifacts/publish-velopack -nologo -v minimal

      - name: Pack Velopack release (canary channel)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          # Output goes to ./Releases/ by default — Burn bundle build below
          # picks up Releases/StartupGroups-canary-Setup.exe from there.
          vpk pack `
            -u StartupGroups `
            -v $version `
            -p artifacts/publish-velopack `
            --channel canary `
            --mainExe StartupGroups.exe `
            --packTitle "Startup Groups" `
            --icon src/StartupGroups.App/Assets/app.ico

      - name: Build Burn bundle (Setup.exe wrapping Velopack Setup + managed BA)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          # Wraps vpk's lean Setup.exe with the styled Mica BA UX. The
          # chained ExePackage runs Setup.exe --silent under the hood, so
          # the Velopack runtime (Update.exe + current\ + packages\) ends
          # up at %LocalAppData%\StartupGroups\ — same destination as a
          # direct Setup.exe install. Auto-update keeps working because
          # the runtime files are present.
          ./installer/StartupGroups.Bundle/build.ps1 `
            -VelopackSetupPath Releases/StartupGroups-canary-Setup.exe `
            -DefaultChannel canary

      - name: Replace lean Setup.exe with Burn bundle in Releases/
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          # vpk upload uploads everything in Releases/ under each file's
          # current name. By overwriting Releases/StartupGroups-canary-Setup.exe
          # with our Burn bundle, canary releases get exactly ONE first-install
          # asset — the styled bundle — under the canonical name. The lean vpk
          # Setup.exe is dropped (would have been redundant on canary anyway:
          # both end up at %LocalAppData%\StartupGroups\, just with different
          # first-install UX).
          Move-Item -Force `
            artifacts/installer/StartupGroups-Bundle-Setup.exe `
            Releases/StartupGroups-canary-Setup.exe

      - name: Upload canary to GitHub releases (prerelease)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          # --pre marks the GitHub release as prerelease so it stays out of
          # the "Latest" badge and the homepage releases widget — only Stable
          # tags from release.yml get those. No title prefix: the tag itself
          # already contains -canary.<n>, no need to repeat it.
          vpk upload github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token $env:GH_TOKEN `
            --tag "${{ steps.version.outputs.tag }}" `
            --releaseName "${{ steps.version.outputs.tag }}" `
            --channel canary `
            --pre

      - name: Publish the draft with auto-generated notes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          # vpk's `upload github` creates the release as a draft with no body.
          # Generate proper release notes from PRs since the previous tag
          # (same approach release.yml uses for Stable) and flip the draft
          # flag so it actually publishes.
          $notes = gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" `
            -f tag_name="${{ steps.version.outputs.tag }}" `
            --jq '.body'
          $notesFile = New-TemporaryFile
          $notes | Set-Content -Path $notesFile -Encoding UTF8
          gh release edit "${{ steps.version.outputs.tag }}" `
            --draft=false `
            --notes-file $notesFile
