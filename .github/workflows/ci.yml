name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', '.gitignore', 'LICENSE']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', '.gitignore', 'LICENSE']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore
        run: dotnet restore StartupGroups.slnx

      - name: Build
        run: dotnet build StartupGroups.slnx -c Release --no-restore

      - name: Test
        run: dotnet test StartupGroups.slnx -c Release --no-build --verbosity normal
