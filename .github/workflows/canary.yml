name: Canary

# Push-triggered Canary releases. Every commit to main produces a Velopack
# release on the `canary` channel and a GitHub release marked as prerelease.
# Replaces the older Nightly cron — feedback loop is now per-commit instead
# of per-day.
#
# Channel mechanics: a Velopack package built with `--channel canary`
# produces channel-scoped assets (e.g. `StartupGroups-X.Y.Z-win-canary-full.nupkg`)
# and a `releases.win-canary.json` feed. The runtime UpdateManager picks
# the channel via `UpdateOptions.ExplicitChannel` (see VelopackUpdateService).
#
# GitHub release visibility: the `--pre` flag below marks each Canary
# release as a prerelease, so the "Latest" badge and the homepage Releases
# widget keep showing the most recent Stable. Title is prefixed `[canary]`
# to make them trivially distinguishable in the full release list.

on:
  push:
    branches: [main]
    # Doc-only edits should not cut a Canary build.
    paths-ignore: ['**.md', 'docs/**', '.gitignore', 'LICENSE']
  workflow_dispatch:

permissions:
  contents: write

# Newer commits cancel earlier still-running Canary runs. We only ever
# want the latest commit to produce the artifact for the channel; older
# in-flight builds would publish stale bits anyway.
concurrency:
  group: canary
  cancel-in-progress: true

jobs:
  canary:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Compute canary version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          [xml]$props = Get-Content Directory.Build.props
          $base = [string]$props.Project.PropertyGroup.Version
          # Count existing canary releases on the same base version, then
          # increment. Resets naturally when Directory.Build.props bumps
          # (e.g. 0.2.14 → 0.3.0 starts a fresh canary.1). Plain numeric
          # so the prerelease identifier is semver-2.0 compliant (leading
          # zeros forbidden in numeric prerelease identifiers).
          $existing = gh api "repos/${{ github.repository }}/releases" --paginate `
            --jq "[.[] | select(.tag_name | startswith(\"v$base-canary.\"))] | length"
          $next = [int]$existing + 1
          $version = "$base-canary.$next"
          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Canary version=$version tag=$tag (existing canaries on base $base = $existing)"

      - name: Install Velopack CLI
        run: dotnet tool install --global vpk --version 0.0.1589-ga2c5a97

      - name: Restore
        run: dotnet restore StartupGroups.slnx

      - name: Build
        run: dotnet build StartupGroups.slnx -c Release --no-restore

      - name: Test
        run: dotnet test StartupGroups.slnx -c Release --no-build --verbosity normal

      - name: Publish for Velopack
        shell: pwsh
        run: |
          dotnet publish src/StartupGroups.App/StartupGroups.App.csproj `
            -c Release -r win-x64 --self-contained true `
            -o artifacts/publish-velopack -nologo -v minimal
          dotnet publish src/StartupGroups.Elevator/StartupGroups.Elevator.csproj `
            -c Release -r win-x64 --self-contained true `
            -o artifacts/publish-velopack -nologo -v minimal

      - name: Pack Velopack release (canary channel)
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          vpk pack `
            -u StartupGroups `
            -v $version `
            -p artifacts/publish-velopack `
            --channel canary `
            --mainExe StartupGroups.exe `
            --packTitle "Startup Groups" `
            --icon src/StartupGroups.App/Assets/app.ico

      - name: Upload canary to GitHub releases (prerelease)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          # --pre marks the GitHub release as prerelease so it stays out of
          # the "Latest" badge and the homepage releases widget — only Stable
          # tags from release.yml get those. No title prefix: the tag itself
          # already contains -canary.<sha>, no need to repeat it.
          vpk upload github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token $env:GH_TOKEN `
            --tag "${{ steps.version.outputs.tag }}" `
            --releaseName "${{ steps.version.outputs.tag }}" `
            --channel canary `
            --pre

      - name: Publish the draft with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          # vpk's `upload github` creates the release as a draft with no body.
          # GitHub's UI then falls back to rendering the squash-commit message
          # — fine in theory, ugly in practice if the commit message has odd
          # markdown escaping. Generate proper release notes from PRs/commits
          # since the previous tag (same approach release.yml uses for Stable)
          # and flip the draft flag so it actually publishes.
          $notes = gh api -X POST "repos/${{ github.repository }}/releases/generate-notes" `
            -f tag_name="${{ steps.version.outputs.tag }}" `
            --jq '.body'
          $notesFile = New-TemporaryFile
          $notes | Set-Content -Path $notesFile -Encoding UTF8
          gh release edit "${{ steps.version.outputs.tag }}" `
            --draft=false `
            --notes-file $notesFile
